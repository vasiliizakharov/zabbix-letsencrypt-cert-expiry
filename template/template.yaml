zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 7df96b18c230490a9a0a9e2307226342
      name: Templates/Crypto
  templates:
    - uuid: a7f1e2c1d3b44f1ea001d3a0c0a5b001
      template: 'Let''s Encrypt certificates'
      name: 'Let''s Encrypt certificates'
      description: |
        Discovers /etc/letsencrypt/live/* and tracks days-to-expiry, issuer
        and key type for each certificate.
        Author: Vasilii Zakharov <vasiliiazakharov@gmail.com>
      groups:
        - name: Templates/Crypto
      macros:
        - macro: '{$ZBX.LE.WARN.DAYS}'
          value: '30'
        - macro: '{$ZBX.LE.HIGH.DAYS}'
          value: '14'
        - macro: '{$ZBX.LE.DISASTER.DAYS}'
          value: '7'
      discovery_rules:
        - uuid: e5f1e2c1d3b44f1ea001d3a0c0a5e001
          name: 'Certificate discovery'
          key: letsencrypt.cert.discovery
          delay: 1h
          item_prototypes:
            - uuid: f5f1e2c1d3b44f1ea001d3a0c0a5f001
              name: 'Cert {#DOMAIN}: days until expiry'
              key: 'letsencrypt.cert.expires_in_days[{#DOMAIN}]'
              delay: 1h
              value_type: FLOAT
              units: d
            - uuid: f5f1e2c1d3b44f1ea001d3a0c0a5f002
              name: 'Cert {#DOMAIN}: issuer'
              key: 'letsencrypt.cert.issuer[{#DOMAIN}]'
              delay: 1d
              value_type: CHAR
            - uuid: f5f1e2c1d3b44f1ea001d3a0c0a5f003
              name: 'Cert {#DOMAIN}: SAN count'
              key: 'letsencrypt.cert.subject_alt_names_count[{#DOMAIN}]'
              delay: 1d
              value_type: UNSIGNED
            - uuid: f5f1e2c1d3b44f1ea001d3a0c0a5f004
              name: 'Cert {#DOMAIN}: signature algorithm'
              key: 'letsencrypt.cert.signature_algorithm[{#DOMAIN}]'
              delay: 1d
              value_type: CHAR
            - uuid: f5f1e2c1d3b44f1ea001d3a0c0a5f005
              name: 'Cert {#DOMAIN}: key type'
              key: 'letsencrypt.cert.key_type[{#DOMAIN}]'
              delay: 1d
              value_type: CHAR
          trigger_prototypes:
            - uuid: '05f1e2c1d3b44f1ea001d3a0c0a50f01'
              expression: 'last(/Let''s Encrypt certificates/letsencrypt.cert.expires_in_days[{#DOMAIN}])<{$ZBX.LE.WARN.DAYS}'
              name: 'Cert {#DOMAIN}: expires in <{$ZBX.LE.WARN.DAYS}d'
              priority: WARNING
            - uuid: '05f1e2c1d3b44f1ea001d3a0c0a50f02'
              expression: 'last(/Let''s Encrypt certificates/letsencrypt.cert.expires_in_days[{#DOMAIN}])<{$ZBX.LE.HIGH.DAYS}'
              name: 'Cert {#DOMAIN}: expires in <{$ZBX.LE.HIGH.DAYS}d'
              priority: HIGH
            - uuid: '05f1e2c1d3b44f1ea001d3a0c0a50f03'
              expression: 'last(/Let''s Encrypt certificates/letsencrypt.cert.expires_in_days[{#DOMAIN}])<{$ZBX.LE.DISASTER.DAYS}'
              name: 'Cert {#DOMAIN}: expires in <{$ZBX.LE.DISASTER.DAYS}d'
              priority: DISASTER
