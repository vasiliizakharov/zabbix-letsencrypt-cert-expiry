# Zabbix UserParameters for Let's Encrypt / X.509 certificate monitoring.
# Author: Vasilii Zakharov <vasiliiazakharov@gmail.com>
# License: MIT
#
# Reads /etc/letsencrypt/live/<domain>/fullchain.pem (or any PEM directory).
# Override the directory with macro {$ZBX.LE.LIVE_DIR} -> ZBX_LE_LIVE_DIR env.

UserParameter=letsencrypt.cert.discovery,/usr/local/bin/zbx_letsencrypt.sh discovery
UserParameter=letsencrypt.cert.expires_in_days[*],/usr/local/bin/zbx_letsencrypt.sh expires "$1"
UserParameter=letsencrypt.cert.issuer[*],/usr/local/bin/zbx_letsencrypt.sh issuer "$1"
UserParameter=letsencrypt.cert.subject_alt_names_count[*],/usr/local/bin/zbx_letsencrypt.sh san_count "$1"
UserParameter=letsencrypt.cert.signature_algorithm[*],/usr/local/bin/zbx_letsencrypt.sh sigalg "$1"
UserParameter=letsencrypt.cert.key_type[*],/usr/local/bin/zbx_letsencrypt.sh keytype "$1"
